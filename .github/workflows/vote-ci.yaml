name: CI — Vote Service (Python)

#DOCKER_REGISTRY - docker.io
#DOCKER_REPO - vilasvarghese/examplevotingapp_vote

on:
  push:
    branches: [main, master, develop]
    paths:
      - "vote/**"
      - ".github/workflows/ci-vote.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "vote/**"
  workflow_dispatch:

env:
  SERVICE: vote
  DOCKERFILE: vote/Dockerfile
  IMAGE_NAME: ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_REPO }}

defaults:
  run:
    working-directory: vote

jobs:
  # ──────────────────────────────────────────────
  # 1. LINT & SCA (fast — fail early)
  # ──────────────────────────────────────────────
  lint-and-sca:
    name: Lint & SCA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: vote/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Linting
  #    - name: Lint with Flake8
  #      run: |
  #        pip install flake8 flake8-bugbear
  #        flake8 . --max-line-length=120 --extend-ignore=E203 \
  #          --format='::error file=%(path)s,line=%(row)d,col=%(col)d::%(text)s' --exit-zero

      # SAST
  #    - name: SAST — Bandit
  #      run: |
  #        pip install bandit
  #        bandit -r . -f sarif -o bandit-results.sarif --exit-zero
  #      continue-on-error: false

  #    - name: Upload Bandit SARIF
  #      uses: github/codeql-action/upload-sarif@v3
  #      if: always()
  #      with:
  #        sarif_file: bandit-results.sarif
  #        category: bandit-vote

      # Dependency SCA
      - name: SCA — pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format json -o pip-audit-results.json || true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-vote-pip-audit
          path: vote/pip-audit-results.json
          retention-days: 14

  # ──────────────────────────────────────────────
  # 2. UNIT TESTS
  # ──────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-sca
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: vote/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --junitxml=test-results.xml \
            -v
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: vote/coverage.xml
          flags: vote
          name: vote-coverage

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-vote
          path: |
            vote/test-results.xml
            vote/htmlcov/
          retention-days: 14

  # ──────────────────────────────────────────────
  # 3. BUILD DOCKER IMAGE
  # ──────────────────────────────────────────────
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: unit-test
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=vote
            org.opencontainers.image.description=Voting service for example-voting-app
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image (no push — for scan)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: vote
          file: vote/Dockerfile
          push: false
          load: true # Exports to local Docker daemon
          platforms: linux/amd64 # Enforces a single architecture for local loading
          provenance: false      # Prevents multi-architecture manifest list errors locally
          sbom: false            # Prevents multi-architecture manifest list errors locally
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=vote
          cache-to: type=gha,mode=max,scope=vote

      - name: Save image tarball
        run: |
          docker save ${{ env.IMAGE_NAME }}:sha-$(git rev-parse --short HEAD) \
            -o /tmp/vote-image.tar

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: vote-image
          path: /tmp/vote-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  # 4. TRIVY IMAGE SCAN
  # ──────────────────────────────────────────────
  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: vote-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/vote-image.tar

#      - name: Run Trivy (CRITICAL+HIGH — block)
#        uses: aquasecurity/trivy-action@master
#        with:
#          image-ref: "${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
#          format: sarif
#          output: trivy-results.sarif
#          severity: CRITICAL,HIGH
#          exit-code: "1"
#          ignore-unfixed: true

#      - name: Run Trivy (full — for reporting)
#        if: always()
#        uses: aquasecurity/trivy-action@master
#        with:
#          image-ref: "${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
#          format: table
#          severity: CRITICAL,HIGH,MEDIUM
#          ignore-unfixed: false
#          exit-code: "0"

#      - name: Upload Trivy SARIF
#        uses: github/codeql-action/upload-sarif@v3
#        if: always()
#        with:
#          sarif_file: trivy-results.sarif
#          category: trivy-vote

  # ──────────────────────────────────────────────
  # 5. CONTAINER STRUCTURE TEST
  # ──────────────────────────────────────────────
#  image-test:
#    name: Container Structure Test
#    runs-on: ubuntu-latest
#    needs: trivy-scan
#    steps:
#      - name: Checkout
#        uses: actions/checkout@v4

#      - name: Download image tarball
#        uses: actions/download-artifact@v4
#        with:
#          name: vote-image
#          path: /tmp

#      - name: Load Docker image
#        run: docker load -i /tmp/vote-image.tar

#      - name: Install container-structure-test
#        run: |
#          curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
#          chmod +x container-structure-test-linux-amd64
#          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

#      - name: Run container structure tests
#        run: |
#          container-structure-test test \
#            --image ${{ env.IMAGE_NAME }}:sha-$(git rev-parse --short HEAD) \
#            --config vote/tests/container-structure-test.yaml

  # ──────────────────────────────────────────────
  # 6. PUSH TO REGISTRY
  # ──────────────────────────────────────────────
  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [trivy-scan] #, image-test
    if: github.event_name != 'pull_request'
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: vote
          file: vote/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=vote
          cache-to: type=gha,mode=max,scope=vote
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true

      - name: Sign image with cosign
        uses: sigstore/cosign-installer@v3
        if: success()

      - name: Cosign sign
        if: success()
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Image summary
        run: |
          echo "### Vote Image Published :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # 7. NOTIFY CD
  # ──────────────────────────────────────────────
  trigger-cd:
    name: Trigger CD
    runs-on: ubuntu-latest
    needs: push-image
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Dispatch CD workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CD_DISPATCH_TOKEN }}
          event-type: deploy-vote
          client-payload: |
            {
              "service": "vote",
              "image": "${{ env.IMAGE_NAME }}",
              "digest": "${{ needs.push-image.outputs.image-digest }}",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}"
            }
