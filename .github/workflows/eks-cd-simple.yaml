name: CD — Deploy to EKS (Simplified Kubectl)

on:
  # Keeps the hook for your CI pipeline's remote trigger
  repository_dispatch:
    types: [deploy-vote]
  # Allows you to trigger it manually via the GitHub Actions UI
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE_STAGING }} # Simplifies to a single target namespace
  IMAGE_NAME: ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_REPO }}

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 1. AUTHENTICATE WITH AWS ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 2. GET EKS CONFIG (Auto-installs kubectl behind the scenes) ──
      - name: Connect to EKS Cluster
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      # ── 3. VALIDATE CONNECTION ──
      - name: Validate Cluster Connection
        run: kubectl cluster-info

      # ── 4. DEPLOY KUBERNETES MANIFESTS ──
      - name: Apply Manifests
        run: |
          # Creates the namespace if it doesn't already exist
          kubectl create namespace ${{ env.KUBE_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          
          # Applies all static yaml configuration files from your repo folder
          kubectl apply -f k8s-specifications/ -n ${{ env.KUBE_NAMESPACE }}

      # ── 5. FORCE COURIER NEW IMAGE DIGEST ──
      - name: Update Deployment Image
        run: |
          # Dynamically updates your deployment with the exact image artifact variant from CI
          # If triggered via repository_dispatch, it grabs the new digest hash; otherwise falls back to 'latest'
          IMAGE_TAG="${{ github.event.client_payload.digest || 'latest' }}"
          
          kubectl set image deployment/vote vote=${{ env.IMAGE_NAME }}:$IMAGE_TAG \
            -n ${{ env.KUBE_NAMESPACE }}

      # ── 6. MONITOR ROLLOUT STATUS ──
      - name: Verify Rollout Success
        run: |
          kubectl rollout status deployment/vote \
            -n ${{ env.KUBE_NAMESPACE }} \
            --timeout=120s
