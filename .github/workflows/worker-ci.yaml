name: CI — Worker Service (.NET)

on:
  push:
    branches: [main, master, develop]
    paths:
      - "worker/**"
      - ".github/workflows/ci-worker.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "worker/**"
  workflow_dispatch:

env:
  SERVICE: worker
  IMAGE_NAME: ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_REPO }}/worker
  DOTNET_VERSION: "7.0"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

defaults:
  run:
    working-directory: worker

jobs:
  # ──────────────────────────────────────────────
  # 1. LINT & SCA
  # ──────────────────────────────────────────────
  lint-and-sca:
    name: Lint & SCA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      # Format check (lint)
      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic
        continue-on-error: true

      # SAST — CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: Build for CodeQL
        run: dotnet build --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-worker

      # Dependency SCA — NuGet audit
      - name: SCA — dotnet list package (vulnerabilities)
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::warning::Vulnerable NuGet packages found — review vuln-report.txt"
          fi

      - name: Upload SCA results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-worker-nuget
          path: worker/vuln-report.txt
          retention-days: 14

  # ──────────────────────────────────────────────
  # 2. UNIT TESTS
  # ──────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-sca
    services:
      redis:
        image: redis:7-alpine
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: votes
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests with coverage
        run: |
          dotnet test \
            --no-restore \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=detailed" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./coverage.xml
        env:
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: votes

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: worker/coverage.xml
          flags: worker
          name: worker-coverage

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-worker
          path: worker/**/*.trx
          retention-days: 14

  # ──────────────────────────────────────────────
  # 3. BUILD DOCKER IMAGE
  # ──────────────────────────────────────────────
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: unit-test
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=worker
            org.opencontainers.image.description=Worker service (.NET) for example-voting-app
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build (no push)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: worker
          file: worker/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

      - name: Save image tarball
        run: |
          docker save ${{ env.IMAGE_NAME }}:sha-$(git rev-parse --short HEAD) \
            -o /tmp/worker-image.tar

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: worker-image
          path: /tmp/worker-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  # 4. TRIVY IMAGE SCAN
  # ──────────────────────────────────────────────
  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: worker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/worker-image.tar

      - name: Trivy scan (block on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy scan (full report)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-worker

  # ──────────────────────────────────────────────
  # 5. CONTAINER STRUCTURE TEST
  # ──────────────────────────────────────────────
  image-test:
    name: Container Structure Test
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: worker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/worker-image.tar

      - name: Install container-structure-test
        run: |
          curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run structure tests
        run: |
          container-structure-test test \
            --image ${{ env.IMAGE_NAME }}:sha-$(git rev-parse --short HEAD) \
            --config worker/tests/container-structure-test.yaml

  # ──────────────────────────────────────────────
  # 6. PUSH TO REGISTRY
  # ──────────────────────────────────────────────
  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [trivy-scan, image-test]
    if: github.event_name != 'pull_request'
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: worker
          file: worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true

      - name: Install cosign & sign image
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Image summary
        run: |
          echo "### Worker Image Published :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY

  trigger-cd:
    name: Trigger CD
    runs-on: ubuntu-latest
    needs: push-image
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Dispatch CD workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CD_DISPATCH_TOKEN }}
          event-type: deploy-worker
          client-payload: |
            {
              "service": "worker",
              "image": "${{ env.IMAGE_NAME }}",
              "digest": "${{ needs.push-image.outputs.image-digest }}",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}"
            }
